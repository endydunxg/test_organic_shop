services:
  - type: web
    name: organic-shop-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn -DskipTests package
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /v3/api-docs
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: JPA_SHOW_SQL
        value: "false"
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
